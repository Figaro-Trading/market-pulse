name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Cheap "compile" pass — catches parse errors across every JS file
      # including the frontend.
      - name: Syntax check
        run: |
          set -e
          node --check server.js
          for f in $(find src test public -name '*.js' 2>/dev/null); do
            node --check "$f"
          done

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      # Trivy: filesystem scan for vulnerable dependencies and exposed secrets.
      # Fails the job on HIGH+ severity findings — production gate.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
