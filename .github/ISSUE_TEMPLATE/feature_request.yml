name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe the problem
        you are trying to solve before describing the solution — it
        helps the maintainer evaluate alternatives.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear description of the problem. e.g. "I cannot filter news by sentiment_score range."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear description of what you want to happen, including the proposed API surface if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Other approaches and why they are less suitable.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, prototypes, links to related discussions.

  - type: checkboxes
    id: confirmations
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and discussions and did not find a duplicate.
          required: true
        - label: This feature fits within the project scope (financial news + public exchange data aggregation).
          required: true
