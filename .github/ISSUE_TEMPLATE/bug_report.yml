name: Bug report
description: Report a defect to help us fix it
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please complete
        the form below — the more detail you provide, the faster we can
        reproduce and fix it.

        For security vulnerabilities, **do not open a public issue**.
        Use the [Security Advisory](https://github.com/Figaro-Trading/market-pulse/security/advisories/new)
        form instead.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, one-paragraph description of the bug.
      placeholder: When I call /api/v1/news with topic=CRYPTO, …
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal reproduction. Include the exact request, payload, or UI action.
      placeholder: |
        1. Start the server with `npm start`.
        2. Run `curl http://localhost:3001/api/v1/news?topic=…`.
        3. Observe …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Paste the response or stack trace.
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: v22.x.y
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 14.5 / Ubuntu 24.04 / Windows 11
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit SHA or release tag
      description: Output of `git rev-parse --short HEAD`, or the release tag.
      placeholder: 0ec035e or v0.1.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output. Set `LOG_LEVEL=debug` if useful.
      render: shell

  - type: checkboxes
    id: confirmations
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I am running Node.js 22 or later.
          required: true
        - label: This is not a security vulnerability (those go through Security Advisory).
          required: true
